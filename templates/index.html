<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch | Movie Recommendation Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout layout--center">
        <header class="topbar">
            <div class="topbar-head">
                <div class="brand">
                    <div class="logo-mark" aria-hidden="true">
                        <svg viewBox="0 0 64 64" fill="none">
                            <path d="M10 22h44v28a6 6 0 0 1-6 6H16a6 6 0 0 1-6-6V22z" stroke="currentColor" stroke-width="3" />
                            <path d="M14 22 24 10h40L54 22H14z" stroke="currentColor" stroke-width="3" />
                            <path d="M26 10 18 18M38 10 30 18M50 10 42 18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <div class="brand-name">CineMatch</div>
                        <div class="brand-sub">Movie recommendation chatbot</div>
                    </div>
                </div>
            </div>
        </header>

        <div class="panel">
            <main class="chat-container" id="chat-window">
                <div class="message bot-message">
                    <div class="bubble">
                        Welcome to CineMatch! Which movie industry do you prefer: <strong>Kollywood</strong>, <strong>Hollywood</strong>, or <strong>Bollywood</strong>?
                    </div>
                </div>
                <!-- Messages will appear here -->
            </main>

            <footer class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type a genre or movie name..." autocomplete="off">
                    <button id="send-btn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
